name: Market Monitor
on:
  schedule:
    - cron: '0 * * * *' # Jalan tiap 1 jam
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
- uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Gunakan versi Python yang lebih baru sekalian
      - name: Install deps
        run: pip install feedparser google-generativeai requests
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/processed.json
          git commit -m "Update processed news" || exit 0
          git push
